<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hemanth Gavara</title>
<link rel="icon" type="image/png" href="32H.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --grey: #888888;
    --light-grey: #e8e8e8;
    --accent: #ffffff;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* Custom Cursor - Hidden on mobile */
  .cursor {
    width: 12px; height: 12px;
    background: white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
    display: block;
  }
  @media (pointer: coarse) { .cursor { display: none; } body { cursor: auto; } }
  .cursor.hover { width: 40px; height: 40px; }

  /* Grain Overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* Hero Canvas */
  #hero-canvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing Orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(80px);
    opacity: 0;
    animation: orbFloat 12s ease-in-out infinite;
  }
  .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); top: -50px; left: -50px; }
  .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); top: 40%; right: -40px; }
  
  @keyframes orbFloat {
    0%   { opacity: 0; transform: translateY(0px) scale(1); }
    20%  { opacity: 1; }
    50%  { transform: translateY(-40px) scale(1.05); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(0px) scale(1); }
  }

  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    opacity: 0.4;
  }

  .dot-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift { from { background-position: 0 0; } to { background-position: 32px 32px; } }

  .spotlight {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(circle, rgba(255,255,255,0.035) 0%, transparent 65%);
    transform: translate(-50%, -50%);
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
  }

  .nav-logo img { height: 32px; width: 32px; object-fit: contain; }

  .nav-links {
    display: flex;
    gap: 15px;
    list-style: none;
    overflow-x: auto;
    padding-bottom: 5px;
  }

  .nav-links::-webkit-scrollbar { display: none; }

  .nav-links a {
    color: var(--grey);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 0 24px 60px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 20vw, 320px);
    color: rgba(255,255,255,0.03);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  @media (min-width: 769px) {
    .hero-content { flex-direction: row; justify-content: space-between; align-items: flex-end; }
  }

  .hero-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(50px, 12vw, 130px);
    line-height: 0.9;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .hero-left h1 em { font-family: 'DM Serif Display', serif; font-style: italic; color: var(--grey); }

  .hero-right {
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
  }

  @media (min-width: 769px) { .hero-right { text-align: right; } }

  .hero-right p { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--grey); line-height: 1.6; }
  .hero-right .year { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--white); margin-top: 5px; display: block; }

  /* SECTIONS */
  section { padding: 80px 24px; }
  @media (min-width: 769px) { section { padding: 100px 48px; } }

  .section-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--grey); margin-bottom: 40px; display: flex; align-items: center; gap: 16px; }
  .section-label::after { content: ''; display: block; height: 1px; width: 40px; background: var(--grey); }

  /* ABOUT */
  #about { display: grid; grid-template-columns: 1fr; gap: 40px; }
  @media (min-width: 769px) { #about { grid-template-columns: 1fr 1fr; gap: 80px; } }

  #about .left .big-text { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 5vw, 56px); line-height: 1.15; font-style: italic; }
  #about .right p { font-size: 13px; line-height: 1.8; color: var(--grey); margin-bottom: 20px; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
  .tag { border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* EDUCATION & PROFILES GRID */
  .edu-grid, .profile-grid { display: grid; grid-template-columns: 1fr; gap: 1px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); margin-top: 40px; }
  @media (min-width: 769px) { 
    .edu-grid { grid-template-columns: repeat(2, 1fr); }
    .profile-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .edu-item, .profile-card { background: var(--black); padding: 30px; position: relative; }

  /* SKILLS */
  .skill-row { display: flex; flex-direction: column; gap: 10px; }
  @media (min-width: 769px) { .skill-row { flex-direction: row; align-items: center; gap: 24px; } }

  .skill-name { font-size: 10px; letter-spacing: 0.1em; color: var(--grey); text-transform: uppercase; }
  @media (min-width: 769px) { .skill-name { width: 200px; } }

  .skill-track { flex: 1; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
  .skill-fill { position: absolute; left: 0; top: 0; height: 1px; background: var(--white); width: 0; transition: width 1.5s ease-out; }

  /* PROJECTS */
  .project-card { display: flex; flex-direction: column; gap: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); margin-top: 30px; }
  @media (min-width: 769px) { .project-card { flex-direction: row; gap: 60px; padding: 60px; } }
  
  .proj-num { font-family: 'Bebas Neue', sans-serif; font-size: 60px; color: rgba(255,255,255,0.05); }
  @media (min-width: 769px) { .proj-num { font-size: 120px; } }

  /* FOOTER */
  footer { padding: 40px 24px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center; }
  @media (min-width: 769px) { footer { flex-direction: row; justify-content: space-between; text-align: left; } }

  /* ANIMATIONS */
  .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="dot-grid"></div>
<div class="scanlines"></div>
<div class="spotlight" id="spotlight"></div>

<nav>
  <a class="nav-logo" href="#"><img src="H.png" alt="HG Logo"></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#education">Education</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#certifications">Certs</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#profiles">Profiles</a></li>
  </ul>
</nav>

<section class="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-bg-text">Dream Big</div>
  <div class="hero-content">
    <div class="hero-left">
      <h1>Hemanth<br><em>Gavara</em></h1>
    </div>
    <div class="hero-right">
      <p>CSE Student · IIT Madras BS · JNTUK</p>
      <p>Python · UI/UX · Cybersecurity</p>
      <span class="year">2007</span>
    </div>
  </div>
</section>

  const cursor = document.getElementById('cursor');

  document.addEventListener('mousemove', e => {

      cursor.style.left = e.clientX + 'px';

</script>
</body>
</html>
